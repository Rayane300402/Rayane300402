name: Update Profile Stats

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  generate-stats:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create profile directory
        run: mkdir -p profile

      - name: Generate GitHub stats
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=rayane300402&show_icons=true&theme=react&include_all_commits=true&count_private=true&hide_border=false
          path: profile/github-stats.svg
          token: ${{ secrets.PROFILE_STATS_TOKEN }}

      - name: Generate top languages
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=rayane300402&layout=compact&langs_count=6&theme=react&hide_border=false
          path: profile/top-languages.svg
          token: ${{ secrets.PROFILE_STATS_TOKEN }}

      - name: Commit updated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update GitHub profile stats" || exit 0
          git push
